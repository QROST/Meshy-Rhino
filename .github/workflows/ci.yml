name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 7
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '7.0.x'

      - name: Restore
        run: dotnet restore Meshy-Rhino.sln

      - name: Build (${{ matrix.configuration }})
        run: dotnet build Meshy-Rhino.sln --configuration ${{ matrix.configuration }} --no-restore
