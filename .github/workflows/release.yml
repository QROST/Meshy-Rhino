name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 7
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Build
        run: dotnet build Meshy-Rhino.sln --configuration Release

      - name: Package
        shell: pwsh
        run: |
          $outDir = "MeshyRhino/bin/Release"
          $staging = "staging"

          New-Item -ItemType Directory -Path $staging -Force

          Get-ChildItem "$outDir/*.dll" | Copy-Item -Destination $staging
          if (Test-Path "$outDir/*.pdb") {
            Get-ChildItem "$outDir/*.pdb" | Copy-Item -Destination $staging
          }

          Compress-Archive -Path "$staging/*" -DestinationPath "MeshyRhino.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeshyRhino
          path: MeshyRhino.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
          body: |
            ## Installation

            1. Download `MeshyRhino.zip`
            2. Extract into a folder (e.g. `%APPDATA%\McNeel\Rhinoceros\8.0\Plug-ins\MeshyRhino\`)
            3. In Rhino, run `_PlugInManager`, click **Install**, and select `MeshyRhino.dll`
            4. Run the `Meshy3DGenerator` command
